buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "25.1.8937393"   // ← downgraded from 27 to 25
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

// Force NDK version for all subprojects that have the Android plugin.
// This must be placed BEFORE the apply plugin line.
subprojects { subproject ->
    subproject.plugins.withId("com.android.application") {
        subproject.android.ndkVersion = rootProject.ext.ndkVersion
    }
    subproject.plugins.withId("com.android.library") {
        subproject.android.ndkVersion = rootProject.ext.ndkVersion
    }
}

apply plugin: "com.facebook.react.rootproject"
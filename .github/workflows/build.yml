name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      _JAVA_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      GRADLE_OPTS: ""
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.1.12297006"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Patch NitroModulesPackage (ReactModuleInfo 7-arg constructor)
        run: |
          NITRO_PKG="node_modules/react-native-nitro-modules/android/src/main/java/com/margelo/nitro/NitroModulesPackage.kt"
          if [ -f "$NITRO_PKG" ]; then
            sed -i 's/hasConstants = true/hasConstants = false/g' "$NITRO_PKG" || true
            sed -i 's/isTurboModule\s*))/isTurboModule, hasConstants = false)/g' "$NITRO_PKG" || true
            echo "Patched NitroModulesPackage.kt"
          else
            echo "WARNING: NitroModulesPackage.kt not found at $NITRO_PKG"
          fi

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  # This line adds the "Run workflow" button in the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      _JAVA_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      GRADLE_OPTS: ""
      # Opts into Node 24 to clear the deprecation warnings in your logs
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean install (postinstall patches nitro-modules automatically)
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Patch NitroModulesPackage (sed safety net)
        run: |
          sed -i 's/isTurboModule = isTurboModule,/isTurboModule = isTurboModule,\n          hasConstants = false,/' \
            node_modules/react-native-nitro-modules/android/src/main/java/com/margelo/nitro/NitroModulesPackage.kt

      - name: Verify nitro-modules patch was applied
        run: |
          if grep -q "hasConstants" node_modules/react-native-nitro-modules/android/src/main/java/com/margelo/nitro/NitroModulesPackage.kt; then
            echo "NitroModulesPackage.kt patch verified"
          else
            echo "ERROR: NitroModulesPackage.kt patch NOT applied!"
            exit 1
          fi

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}